name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  # Pinned Pester 5.7.1 — matches local gate. Do not use MinimumVersion-only:
  # runners can install Pester 6.x, whose TestDrive teardown fails on Windows
  # git read-only objects under $TestDrive (Access denied). Tests also clear
  # RO attrs via tests/helpers/Clear-TestDriveGit.ps1 before teardown.
  test-pwsh:
    name: test (pwsh)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester 5.7.1 (pinned)
        shell: pwsh
        run: |
          $pin = '5.7.1'
          Install-Module Pester -RequiredVersion $pin -Force -SkipPublisherCheck -Scope CurrentUser
          Import-Module Pester -RequiredVersion $pin -ErrorAction Stop
          $m = Get-Module Pester
          Write-Host "Pester $($m.Version) shell=$($PSVersionTable.PSVersion) edition=$($PSVersionTable.PSEdition)"
          if ($m.Version.ToString() -ne $pin) {
            Write-Error "Expected Pester $pin, got $($m.Version)"
            exit 1
          }
      - name: Run tests
        shell: pwsh
        run: |
          Import-Module Pester -RequiredVersion 5.7.1 -ErrorAction Stop
          Write-Host "PSVersion=$($PSVersionTable.PSVersion) PSEdition=$($PSVersionTable.PSEdition) Pester=$((Get-Module Pester).Version)"
          $r = Invoke-Pester -Path tests -PassThru -Output Detailed
          if ($null -eq $r) { Write-Error 'Invoke-Pester returned null'; exit 1 }
          if ($r.Result -ne 'Passed' -or $r.FailedCount -gt 0 -or $r.TotalCount -lt 9) {
            Write-Error "Pester failed: Result=$($r.Result) Total=$($r.TotalCount) Failed=$($r.FailedCount)"
            exit 1
          }

  # Windows PowerShell 5.1 — scripts declare #requires -Version 5.1
  test-powershell51:
    name: test (powershell 5.1)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester 5.7.1 (pinned)
        shell: powershell
        run: |
          $pin = '5.7.1'
          Install-Module Pester -RequiredVersion $pin -Force -SkipPublisherCheck -Scope CurrentUser
          Import-Module Pester -RequiredVersion $pin -ErrorAction Stop
          $m = Get-Module Pester
          Write-Host "Pester $($m.Version) shell=$($PSVersionTable.PSVersion) edition=$($PSVersionTable.PSEdition)"
          if ($m.Version.ToString() -ne $pin) {
            Write-Error "Expected Pester $pin, got $($m.Version)"
            exit 1
          }
      - name: Run tests
        shell: powershell
        run: |
          Import-Module Pester -RequiredVersion 5.7.1 -ErrorAction Stop
          Write-Host "PSVersion=$($PSVersionTable.PSVersion) PSEdition=$($PSVersionTable.PSEdition) Pester=$((Get-Module Pester).Version)"
          $r = Invoke-Pester -Path tests -PassThru -Output Detailed
          if ($null -eq $r) { Write-Error 'Invoke-Pester returned null'; exit 1 }
          if ($r.Result -ne 'Passed' -or $r.FailedCount -gt 0 -or $r.TotalCount -lt 9) {
            Write-Error "Pester failed: Result=$($r.Result) Total=$($r.TotalCount) Failed=$($r.FailedCount)"
            exit 1
          }
