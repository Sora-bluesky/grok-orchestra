name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    name: test (${{ matrix.shell }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # pwsh = PowerShell 7+; powershell = Windows PowerShell 5.1
        # Scripts declare #requires -Version 5.1 — both legs must stay green.
        shell: [pwsh, powershell]
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester 5
        shell: ${{ matrix.shell }}
        run: |
          Install-Module Pester -MinimumVersion 5.5 -Force -SkipPublisherCheck -Scope CurrentUser
          # Fail closed if the runner somehow lacks a usable Pester 5
          $pester = Get-Module -ListAvailable Pester |
            Where-Object { $_.Version -ge [version]'5.0.0' } |
            Sort-Object Version -Descending |
            Select-Object -First 1
          if (-not $pester) {
            Write-Error 'Pester 5+ not available after Install-Module'
            exit 1
          }
          Write-Host "Pester $($pester.Version) shell=$($PSVersionTable.PSVersion) edition=$($PSVersionTable.PSEdition)"
      - name: Run tests
        shell: ${{ matrix.shell }}
        run: |
          Import-Module Pester -MinimumVersion 5.0 -ErrorAction Stop
          Write-Host "PSVersion=$($PSVersionTable.PSVersion) PSEdition=$($PSVersionTable.PSEdition)"
          $r = Invoke-Pester -Path tests -PassThru -Output Detailed
          if ($null -eq $r) { Write-Error 'Invoke-Pester returned null'; exit 1 }
          if ($r.Result -ne 'Passed' -or $r.FailedCount -gt 0 -or $r.TotalCount -lt 9) {
            Write-Error "Pester failed: Result=$($r.Result) Total=$($r.TotalCount) Failed=$($r.FailedCount)"
            exit 1
          }
